version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: payment-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-deploy:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  payment-service:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8080:8080"
    environment:
      MYSQL_CONNECTION_STRING: "root:root@tcp(mysql:3306)/payment?parseTime=true"
      GIN_MODE: release
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql-data:
